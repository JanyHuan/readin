<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>读书手账 · Reading Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>读书手账</h1>
        <span class="en">Reading Journal</span>
      </div>
      <div class="header-tools">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search" placeholder="搜索书名、作者、笔记…" />
        </div>
        <div class="seg">
          <button data-view="grid" class="active">网格</button>
          <button data-view="list">列表</button>
          <button data-view="timeline">时间线</button>
        </div>
        <button class="icon-btn" id="themeBtn" title="切换明暗">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="filters">
      <div class="filter-row" id="statusRow"></div>
    </section>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <section id="content"></section>
    </div>
  </main>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer"><div class="drawer-inner"></div></aside>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
